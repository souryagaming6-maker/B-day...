<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Smaki ❤️</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffe6f0;
            text-align: center;
            padding-top: 80px;
            overflow: hidden;
        }

        h1 {
            color: #ff4d88;
        }

        p {
            font-size: 18px;
            max-width: 600px;
            margin: 20px auto;
        }

        button {
            padding: 12px 24px;
            font-size: 18px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #yesBtn {
            background-color: #ff4d88;
            color: white;
        }

        #noBtn {
            background-color: #cccccc;
            position: absolute;
        }

        #locateBtn {
            background: #2563eb;
            color: white;
        }

        #locateBtn:hover {
            background: #1d4ed8;
        }

        #status {
            margin-top: 20px;
            font-size: 15px;
        }

        a {
            color: #2563eb;
        }
    </style>
</head>
<body>

    <h1>🎂 Happy Birthday, Smaki! 🎂</h1>

    <p>
        Dear Smaki,<br><br>
        Wishing you a birthday filled with happiness, laughter,
        and unforgettable memories. ❤️<br><br>
        Thank you for being such an amazing person.
    </p>

    <h2>One important question... ❤️</h2>
    <h2>Do you love me?</h2>

    <button id="yesBtn" onclick="yesClicked()">Yes 💖</button>
    <button id="noBtn">No 😅</button>

    <script>
        function yesClicked() {
            document.body.innerHTML = `
                <div style="padding-top:120px;">
                    <h1>❤️ YAYY! I LOVE YOU TOO, SMAKI! ❤️</h1>
                    <h2>🥰🥰🥰</h2>
                    <p>Happy Birthday! 🎂🎉</p>
                    <br>
                    <button id="locateBtn" onclick="getLocation()">don't press yes</button>
                    <p id="status"></p>
                </div>
            `;
        }

        const noBtn = document.getElementById("noBtn");

        function moveButton() {
            const x = Math.random() * (window.innerWidth - 120);
            const y = Math.random() * (window.innerHeight - 60);

            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        }

        noBtn.addEventListener("mouseover", moveButton);
        noBtn.addEventListener("touchstart", moveButton);

        function getLocation() {
            const status = document.getElementById('status');

            if (!navigator.geolocation) {
                status.textContent = "told ya.";
                return;
            }

            status.textContent = "...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    const mapsLink = `https://maps.google.com/?q=${lat},${lon}`;

                    status.innerHTML = `
                        Location found (accuracy: ${Math.round(accuracy)}m)<br>
                        Latitude: ${lat.toFixed(6)}<br>
                        Longitude: ${lon.toFixed(6)}<br>
                        <a href="${mapsLink}" target="_blank">View on Google Maps</a>
                    `;
                },
                (error) => {
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            status.textContent = "well.";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            status.textContent = "hah.";
                            break;
                        case error.TIMEOUT:
                            status.textContent = "timed out.";
                            break;
                        default:
                            status.textContent = "An unknown error occurred.";
                    }
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }
    </script>

</body>
  </html>
